<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1050 Lab 25 – Session Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:       #07090f;
            --bg-panel: #0e1320;
            --bg-card:  #111827;
            --border:   #1e2d45;
            --text:     #e2e8f0;
            --muted:    #64748b;
            --accent:   #38bdf8;
            --lum-low:  #3b82f6;
            --lum-mid:  #f59e0b;
            --lum-high: #ef4444;
        }
        html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

        header { background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 70px; position: sticky; top: 0; z-index: 1000; }
        .site-title { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: 0.5px; line-height: 1.3; }
        .site-title span { color: var(--accent); display: block; font-size: 0.7rem; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        nav { display: flex; gap: 6px; }
        nav a { text-decoration: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; padding: 8px 16px; border-radius: 6px; border: 1px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 7px; }
        nav a:hover, nav a.active { color: var(--text); border-color: var(--border); background: var(--bg-card); text-decoration: none; }
        nav a svg { width: 15px; height: 15px; flex-shrink: 0; }

        .page-hero { padding: 56px 48px 40px; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
        .page-hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(56,189,248,0.07) 0%, transparent 70%); pointer-events: none; }
        .page-eyebrow { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
        .page-hero h1 { font-family: 'Space Mono', monospace; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 6px; }
        .page-hero h1 em { font-style: normal; color: var(--accent); }
        .page-hero .meta { font-size: 0.82rem; color: var(--muted); }

        .content { padding: 40px 48px 64px; }

        /* Stats row */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
        .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
        .stat-value { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; color: #fff; }

        /* Section label */
        .section-label { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
        .section-title { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .section-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 20px; }

        /* Timeline */
        .timeline-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 32px;
            position: relative;
        }
        .timeline-bar {
            display: flex;
            height: 56px;
            border-radius: 6px;
            overflow: visible;
            position: relative;
            gap: 1px;
        }
        .timeline-segment {
            flex: 1;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: filter 0.15s, transform 0.15s;
            min-width: 2px;
        }
        .timeline-segment:hover {
            filter: brightness(1.4);
            transform: scaleY(1.12);
            z-index: 10;
        }

        /* Tooltip */
        .tooltip {
            position: fixed;
            background: #0e1320;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.9;
            pointer-events: none;
            z-index: 9999;
            display: none;
            min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .tooltip.visible { display: block; }
        .tooltip-time { color: var(--accent); font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .tooltip-row { display: flex; justify-content: space-between; gap: 16px; }
        .tooltip-label { color: var(--muted); }
        .tooltip-val   { color: var(--text); }
        .tooltip-divider { border: none; border-top: 1px solid var(--border); margin: 5px 0; }
        .tooltip-band-row { display: flex; justify-content: space-between; gap: 12px; }
        .tooltip-band-label { color: var(--muted); font-size: 0.7rem; }
        .tooltip-band-val   { color: var(--accent); font-size: 0.7rem; }

        /* Time axis */
        .time-axis { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.68rem; color: var(--muted); font-family: 'Space Mono', monospace; }

        /* Legend */
        .timeline-legend { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; color: #94a3b8; }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

        /* Loading / error */
        .state-msg { text-align: center; padding: 60px 0; font-family: 'Space Mono', monospace; color: var(--muted); font-size: 0.85rem; }

        footer { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 28px 48px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px; }
        footer .foot-left { font-size: 0.8rem; color: var(--muted); line-height: 1.8; }
        footer .foot-left strong { font-family: 'Space Mono', monospace; color: var(--text); display: block; margin-bottom: 4px; }
        footer .foot-links { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        footer .foot-links a { text-decoration: none; color: var(--muted); font-size: 0.82rem; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
        footer .foot-links a:hover { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <div class="site-title">1050 Lab 25<span>Light Pollution Monitor</span></div>
        <nav>
            <a href="Homepage.html">
                <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7A1 1 0 003 11h1v6a1 1 0 001 1h4v-4h2v4h4a1 1 0 001-1v-6h1a1 1 0 00.707-1.707l-7-7z"/></svg>
                Home
            </a>
            <a href="Aboutuspage.html">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
                Overview
            </a>
            <a href="SubmitReading.html">
                <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                Submit
            </a>
        </nav>
    </header>

    <section class="page-hero">
        <p class="page-eyebrow">Session Detail</p>
        <h1 id="hero-title">Loading <em>session...</em></h1>
        <p class="meta" id="hero-meta"></p>
    </section>

    <div class="content">
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Readings</div><div class="stat-value" id="s-count">—</div></div>
            <div class="stat-card"><div class="stat-label">Duration</div><div class="stat-value" id="s-duration">—</div></div>
            <div class="stat-card"><div class="stat-label">Avg Clear</div><div class="stat-value" id="s-avg">—</div></div>
            <div class="stat-card"><div class="stat-label">Peak Clear</div><div class="stat-value" id="s-peak">—</div></div>
            <div class="stat-card"><div class="stat-label">Min Clear</div><div class="stat-value" id="s-min">—</div></div>
        </div>

        <div id="main-content">
            <div class="state-msg" id="state-msg">Loading session data...</div>
        </div>
    </div>

    <!-- Floating tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-time" id="tt-time"></div>
        <div class="tooltip-row"><span class="tooltip-label">Clear</span><span class="tooltip-val" id="tt-clear"></span></div>
        <div class="tooltip-row"><span class="tooltip-label">NIR</span><span class="tooltip-val" id="tt-nir"></span></div>
        <hr class="tooltip-divider">
        <div id="tt-bands"></div>
    </div>

    <footer>
        <div class="foot-left"><strong>1050 Lab 25 – Light Pollution</strong>London, Ontario</div>
        <div class="foot-links">
            <span style="font-size:0.78rem;color:var(--muted);">Contact Us:</span>
            <a href="https://mail.google.com/mail/u/0/#inbox"><svg viewBox="0 0 20 20" fill="currentColor" width="14"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>Email</a>
            <a href="https://twitter.com/"><svg viewBox="0 0 24 24" fill="currentColor" width="14"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Twitter</a>
        </div>
    </footer>

    <script>
    const BAND_NAMES = ['F1','F2','F3','F4','F5','F6','F7','F8'];

    function clearColour(val) {
        if (val < 300)  return '#3b82f6';
        if (val <= 700) return '#f59e0b';
        return '#ef4444';
    }

    // ── Get session ID from URL param ──────────────────────────────
    const params    = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');

    if (!sessionId) {
        document.getElementById('hero-title').innerHTML = 'No session <em>specified</em>';
        document.getElementById('state-msg').textContent = 'Please navigate here from a map pin.';
    } else {
        loadSession(sessionId);
    }

    async function loadSession(id) {
        const url = `readings/${id}.json?t=` + Date.now();
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderSession(data);
        } catch(e) {
            document.getElementById('state-msg').textContent = `Could not load ${id}.json — ${e.message}`;
        }
    }

    function renderSession(data) {
        const readings = data.readings;
        if (!readings || !readings.length) {
            document.getElementById('state-msg').textContent = 'No readings found in this session file.';
            return;
        }

        // ── Hero ──
        document.getElementById('hero-title').innerHTML =
            `${data.id.replace('_',' ').toUpperCase()} <em>— ${data.date}</em>`;
        document.getElementById('hero-meta').textContent =
            `${readings[0].time} – ${readings[readings.length-1].time}  ·  ${readings.length} readings  ·  ${data.coordinates.join(', ')}`;

        // ── Stats ──
        const clears = readings.map(r => r.Clear);
        const avg    = Math.round(clears.reduce((a,b) => a+b, 0) / clears.length);
        const peak   = Math.max(...clears);
        const min    = Math.min(...clears);

        // Duration
        const t0 = readings[0].time.split(':').map(Number);
        const t1 = readings[readings.length-1].time.split(':').map(Number);
        const secs = (t1[0]-t0[0])*3600 + (t1[1]-t0[1])*60 + (t1[2]-t0[2]);
        const durStr = secs >= 60 ? `${Math.floor(secs/60)}m ${secs%60}s` : `${secs}s`;

        document.getElementById('s-count').textContent    = readings.length;
        document.getElementById('s-duration').textContent = durStr;
        document.getElementById('s-avg').textContent      = avg;
        document.getElementById('s-peak').textContent     = peak;
        document.getElementById('s-min').textContent      = min;

        // ── Timeline ──
        document.getElementById('state-msg').style.display = 'none';

        const mainEl = document.getElementById('main-content');
        mainEl.innerHTML = `
            <p class="section-label">Timeline</p>
            <p class="section-title">Spectral readings over time</p>
            <p class="section-sub">Colour indicates Clear channel intensity. Hover any segment for full spectral breakdown.</p>
            <div class="timeline-wrap">
                <div class="timeline-bar" id="timeline-bar"></div>
                <div class="time-axis">
                    <span>${readings[0].time}</span>
                    <span>${readings[Math.floor(readings.length/4)].time}</span>
                    <span>${readings[Math.floor(readings.length/2)].time}</span>
                    <span>${readings[Math.floor(readings.length*3/4)].time}</span>
                    <span>${readings[readings.length-1].time}</span>
                </div>
                <div class="timeline-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Clear &lt; 300</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Clear 300–700</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Clear &gt; 700</div>
                </div>
            </div>`;

        const bar     = document.getElementById('timeline-bar');
        const tooltip = document.getElementById('tooltip');

        // Bucket readings if there are too many for smooth rendering
        const MAX_SEGMENTS = 400;
        let displayReadings = readings;
        if (readings.length > MAX_SEGMENTS) {
            const step = Math.ceil(readings.length / MAX_SEGMENTS);
            displayReadings = readings.filter((_, i) => i % step === 0);
        }

        displayReadings.forEach(r => {
            const seg = document.createElement('div');
            seg.className = 'timeline-segment';
            seg.style.background = clearColour(r.Clear);

            seg.addEventListener('mousemove', e => {
                // Sort bands highest to lowest
                const bands = BAND_NAMES.map(n => ({ name: n, val: r[n] }))
                                         .sort((a, b) => b.val - a.val);

                document.getElementById('tt-time').textContent  = r.time;
                document.getElementById('tt-clear').textContent = r.Clear;
                document.getElementById('tt-nir').textContent   = r.NIR;
                document.getElementById('tt-bands').innerHTML   = bands.map(b =>
                    `<div class="tooltip-band-row">
                        <span class="tooltip-band-label">${b.name}</span>
                        <span class="tooltip-band-val">${b.val}</span>
                     </div>`
                ).join('');

                // Position tooltip near cursor, keep within viewport
                const tw = 200, th = 220;
                let x = e.clientX + 14;
                let y = e.clientY + 14;
                if (x + tw > window.innerWidth)  x = e.clientX - tw - 14;
                if (y + th > window.innerHeight) y = e.clientY - th - 14;

                tooltip.style.left    = x + 'px';
                tooltip.style.top     = y + 'px';
                tooltip.classList.add('visible');
            });

            seg.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
            bar.appendChild(seg);
        });
    }

    // Hide tooltip when mouse leaves window
    document.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').classList.remove('visible');
    });
    </script>
</body>
</html>
